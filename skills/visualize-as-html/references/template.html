<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
    :root {
      --bg: #fafafa;
      --fg: #1f2328;
      --muted: #6b7280;
      --accent: #2563eb;
      --border: #e5e7eb;
      --card: #ffffff;
      --code-bg: #f3f4f6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0d10;
        --fg: #e6edf3;
        --muted: #8b949e;
        --accent: #7aa2f7;
        --border: #30363d;
        --card: #161b22;
        --code-bg: #1c2128;
      }
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.55;
      color: var(--fg);
      background: var(--bg);
    }
    .page {
      max-width: 72rem;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }
    header.page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
      margin-bottom: 32px;
    }
    h1 { font-size: 28px; margin: 0; letter-spacing: -0.01em; }
    h2 { font-size: 20px; margin: 32px 0 12px; letter-spacing: -0.005em; }
    h3 { font-size: 16px; margin: 24px 0 8px; }
    p { margin: 0 0 12px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code, pre {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13.5px;
    }
    code { background: var(--code-bg); padding: 1px 6px; border-radius: 4px; }
    pre { background: var(--code-bg); padding: 12px 14px; border-radius: 8px; overflow-x: auto; }
    pre code { background: transparent; padding: 0; }
    .muted { color: var(--muted); }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }
    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
    }
    th, td {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th { font-weight: 600; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .tag.accent { color: var(--accent); border-color: var(--accent); }
    footer.page-footer {
      margin-top: 64px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1>{{TITLE}}</h1>
      <span class="tag accent">{{PATTERN_NAME}}</span>
    </header>

    <main>
      <!-- replace this comment with pattern-specific structure -->
      <section class="card">
        <h2>Section title</h2>
        <p>Body content.</p>
      </section>
    </main>

    <footer class="page-footer">
      Generated by <code>thought-shower:visualize-as-html</code>.
      Pattern: {{PATTERN_NUMBER}} — {{PATTERN_NAME}}.
    </footer>
  </div>
</body>
</html>
